# Netlify Configuration File
# Optimized for SPA routing and seamless full-stack API proxy integration

[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api requests to the live high-performance Google Cloud Run backend.
# This prevents CORS errors and ensures database operations function out-of-the-box.
[[redirects]]
  from = "/api/*"
  to = "https://ais-pre-6uyqdapffx4i4uapjnq7rt-117172139055.asia-southeast1.run.app/api/:splat"
  status = 200
  force = true

# Proxy static resource uploads to the live Google Cloud Run backend.
[[redirects]]
  from = "/uploads/*"
  to = "https://ais-pre-6uyqdapffx4i4uapjnq7rt-117172139055.asia-southeast1.run.app/uploads/:splat"
  status = 200
  force = true

# Catch-all fallback rule for React Router client-side routing.
# Maps all subroutes under the domain back to index.html with a 200 OK wrapper.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
